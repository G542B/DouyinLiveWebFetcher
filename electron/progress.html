<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音弹幕抓取工具 - 安装中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
            color: #333;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .progress-container {
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 6px;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            min-height: 40px;
        }
        
        .log-container {
            margin-top: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            color: #444;
        }
        
        .log-item {
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .log-item.success {
            color: #28a745;
        }
        
        .log-item.error {
            color: #dc3545;
        }
        
        .error-container {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fff3f3;
            border: 1px solid #ffc9c9;
            border-radius: 8px;
        }
        
        .error-container.show {
            display: block;
        }
        
        .error-title {
            color: #dc3545;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .error-message {
            color: #555;
            font-size: 13px;
            margin-bottom: 15px;
        }
        
        .retry-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }
        
        .retry-btn:hover {
            background: #5a6fd6;
        }
        
        .success-container {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .success-container.show {
            display: block;
        }
        
        .checkmark {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .checkmark svg {
            width: 30px;
            height: 30px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>抖音弹幕抓取工具</h1>
        <p class="subtitle">正在准备环境...</p>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status" id="statusText">正在初始化...</div>
        </div>
        
        <div class="log-container" id="logContainer"></div>
        
        <div class="error-container" id="errorContainer">
            <div class="error-title">安装失败</div>
            <div class="error-message" id="errorMessage"></div>
            <button class="retry-btn" id="retryBtn">重试</button>
        </div>
        
        <div class="success-container" id="successContainer">
            <div class="checkmark">
                <svg viewBox="0 0 24 24">
                    <path d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <p style="font-size: 16px; color: #28a745; font-weight: bold;">安装完成！</p>
            <p style="color: #666; margin-top: 8px; font-size: 14px;">正在启动应用...</p>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const logContainer = document.getElementById('logContainer');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');
        const retryBtn = document.getElementById('retryBtn');
        const successContainer = document.getElementById('successContainer');
        
        function addLog(message, type = '') {
            const logItem = document.createElement('div');
            logItem.className = 'log-item' + (type ? ' ' + type : '');
            logItem.textContent = message;
            logContainer.appendChild(logItem);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        ipcRenderer.on('progress', (event, { progress, status }) => {
            progressFill.style.width = `${progress}%`;
            statusText.textContent = status;
        });
        
        ipcRenderer.on('log', (event, { message, type }) => {
            addLog(message, type);
        });
        
        ipcRenderer.on('error', (event, { message }) => {
            errorMessage.textContent = message;
            errorContainer.classList.add('show');
        });
        
        ipcRenderer.on('success', () => {
            successContainer.classList.add('show');
        });
        
        retryBtn.addEventListener('click', () => {
            errorContainer.classList.remove('show');
            errorMessage.textContent = '';
            logContainer.innerHTML = '';
            progressFill.style.width = '0%';
            ipcRenderer.send('retry');
        });
        
        ipcRenderer.send('ready');
    </script>
</body>
</html>
